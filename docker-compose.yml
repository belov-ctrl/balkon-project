version: '3.8'

services:
  strapi:
    container_name: strapi_backend
    image: strapi/strapi:latest
    restart: unless-stopped
    environment:
      DATABASE_CLIENT: sqlite
      NODE_ENV: development
    volumes:
      - strapi-data:/opt/app
    ports:
      - '1337:1337'

volumes:
  strapi-data: